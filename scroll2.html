<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TuneHatch Display</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .panel { border-bottom: 3px solid #333; padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #weekly { flex: 2; overflow: hidden; background: #111; }
        .show-name { font-size: 2rem; font-weight: bold; color: #ffcc00; }
        h2 { text-transform: uppercase; letter-spacing: 2px; color: #888; font-size: 1.2rem; margin-bottom: 10px; }
        .ticker-item { padding: 15px; border-bottom: 1px solid #222; font-size: 1.4rem; }
        .scroll { animation: scrollUp 40s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }
    </style>
</head>
<body>
    <div class="panel" id="early-show"><h2>6:00 PM Early Show</h2><div class="show-name" id="early-content">Loading...</div></div>
    <div class="panel" id="late-show"><h2>9:00 PM Late Show</h2><div class="show-name" id="late-content">Loading...</div></div>
    <div class="panel" id="weekly"><h2>Upcoming Week</h2><div id="ticker"></div></div>

    <script>
    let auth_token = "";

    // Yodeck automatically calls this function when the app starts
    function init_widget(config) {
        if (config && config.player_params) {
            auth_token = config.player_params['auth_token'];
        }
        updateFeed(); // Start the feed once we have the token
    }

    async function updateFeed() {
        // Try port 9999 first, then 8080 if it fails
        const ports = ["9999", "8080"];
        let success = false;

        for (let port of ports) {
            if (success) break;

            const playerProxy = `http://localhost:${port}/request`;
            const requestOptions = {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `widget ${auth_token}` // Required security header
                },
                body: JSON.stringify({
                    url: "https://tunehatch.com/api/v1/shows/feed/dc6b2a1a-b2c4-489b-bade-d1f3664ae171?limit=10",
                    method: "GET"
                })
            };

            try {
                const response = await fetch(playerProxy, requestOptions);
                if (!response.ok) continue;

                const result = await response.json();
                const shows = result.events;
                const todayStr = new Date().toISOString().split('T')[0];

                const early = shows.find(s => s.start_time.includes('18:00') && s.start_time.startsWith(todayStr));
                const late = shows.find(s => s.start_time.includes('21:00') && s.start_time.startsWith(todayStr));

                document.getElementById('early-content').innerText = early ? early.name : "No Show Scheduled";
                document.getElementById('late-content').innerText = late ? late.name : "No Show Scheduled";

                const ticker = document.getElementById('ticker');
                ticker.innerHTML = '<div class="scroll">' + 
                    shows.map(s => {
                        const date = new Date(s.start_time).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                        const time = new Date(s.start_time).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                        return `<div class="ticker-item"><strong>${date} @ ${time}</strong><br>${s.name}</div>`;
                    }).join('') + '</div>';
                
                success = true;
            } catch (error) {
                console.log(`Port ${port} failed, trying next...`);
            }
        }

        if (!success) {
            document.getElementById('early-content').innerText = "Waiting for Player Sync...";
        }
    }

    // Refresh every 30 minutes
    setInterval(updateFeed, 1800000);
</script>
</body>
</html>
