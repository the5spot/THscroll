<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 5 Spot – Upcoming Shows</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        h1 { margin: 20px 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .events { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 90vw; padding-bottom: 150px; }
        .event { text-align: center; }
        .event img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .title { margin-top: 15px; font-size: 1.4rem; font-weight: bold; }
        .date { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h1>Upcoming Shows</h1>
    <div id="events" class="events">Loading shows...</div>

<script>
(async () => {
    const container = document.getElementById("events");
    const targetUrl = "https://tunehatch.com";
    
    // NEW PROXY: corsproxy.io is often faster and more reliable for JSON
    const proxyUrl = "https://corsproxy.io?" + encodeURIComponent(targetUrl);

    try {
        console.log("Fetching shows via corsproxy.io...");
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error("Primary proxy failed");
        
        // This proxy returns the data DIRECTLY, no need to unbox 'contents'
        const shows = await response.json(); 

        if (!Array.isArray(shows)) throw new Error("Data is not a list");

        container.innerHTML = ""; 
        const options = { month: "short", day: "numeric", weekday: "short" };
        
        shows.forEach(show => {
            const date = new Date(show.startDate);
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = `
                <img src="${show.imageUrl}" alt="${show.title}">
                <div class="title">${show.title}</div>
                <div class="date">${date.toLocaleDateString("en-US", options)}</div>
            `;
            container.appendChild(div);
        });

        // Start scrolling
        startAutoScroll();

    } catch (err) {
        console.error("TuneHatch Load Error:", err);
        container.innerHTML = "<p style='color:red;'>Unable to load events. Error: " + err.message + "</p>";
    }
})();

function startAutoScroll() {
    setInterval(() => {
        window.scrollBy(0, 1);
        if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 5) {
            window.scrollTo(0, 0);
        }
    }, 40); 
}
</script>
</body>
</html>
