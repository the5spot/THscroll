<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 5 Spot – Upcoming Shows</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin: 20px 0;
    font-size: 2.2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .events {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    max-width: 90vw;
  }
  .event {
    text-align: center;
  }
  .event img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
  }
  .title {
    margin-top: 10px;
    font-size: 1.4rem;
  }
  .date {
    font-size: 1rem;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <h1>Upcoming Shows</h1>
  <div id="events" class="events"></div>
<script>
(async () => {
  const eventsContainer = document.getElementById("events");
  
  try {
    // 1. The original data source
    const feedUrl = "https://tunehatch.com";
    
    // 2. The CORRECT proxy URL format (Note the /get?url=)
    const proxyUrl = `https://api.allorigins.win{encodeURIComponent(feedUrl)}`;
    
    console.log("Fetching from:", proxyUrl); // Helpful for debugging in F12 console

    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    
    const data = await response.json();
    
    // 3. AllOrigins wraps the data; we must parse the 'contents' string
    if (!data.contents) throw new Error("No data received from proxy");
    const shows = JSON.parse(data.contents); 

    // 4. Render the shows
    eventsContainer.innerHTML = ""; // Clear any previous error/loading text
    const options = { month: "short", day: "numeric", weekday: "short" };
    
    shows.slice(0, 4).forEach(show => {
      const date = new Date(show.startDate);
      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `
        <a href="${show.ticketUrl}" target="_blank">
          <img src="${show.imageUrl}" alt="${show.title}" style="width:100%; border-radius:10px;">
        </a>
        <div class="title" style="margin-top:10px; font-size:1.4rem; font-weight:bold;">${show.title}</div>
        <div class="date" style="opacity:0.8; margin-bottom:20px;">${date.toLocaleDateString("en-US", options)}</div>
      `;
      eventsContainer.appendChild(div);
    });

  } catch (err) {
    eventsContainer.innerHTML = "<p style='color:red;'>Unable to load events. Please check the console (F12) for details.</p>";
    console.error("TuneHatch Load Error:", err);
  }
})();
</script>
</body>
</html>
