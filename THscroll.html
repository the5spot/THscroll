<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 5 Spot – Upcoming Shows</title>
<style>
  body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
  h1 { margin: 20px 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px; }
  .events { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 90vw; padding-bottom: 50px; }
  .event { text-align: center; }
  .event img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
  .title { margin-top: 10px; font-size: 1.4rem; font-weight: bold; }
  .date { font-size: 1rem; opacity: 0.8; margin-bottom: 20px; }
</style>
</head>
<body>
  <h1>Upcoming Shows</h1>
  <div id="events" class="events">Loading shows...</div>

<script>
(async () => {
  const container = document.getElementById("events");
  try {
    // 1. Fetch the data using the correct proxy path
    const tuneHatchUrl = "https://tunehatch.com";
    const proxyUrl = "https://api.allorigins.win" + encodeURIComponent(tuneHatchUrl);
    
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error("Proxy error");
    
    const data = await response.json();
    const shows = JSON.parse(data.contents); // Unpack the data

    container.innerHTML = ""; 
    const options = { month: "short", day: "numeric", weekday: "short" };
    
    shows.forEach(show => {
      const date = new Date(show.startDate);
      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `
        <img src="${show.imageUrl}" alt="${show.title}">
        <div class="title">${show.title}</div>
        <div class="date">${date.toLocaleDateString("en-US", options)}</div>
      `;
      container.appendChild(div);
    });

    // 2. Simple Auto-Scroll for YoDeck
    startAutoScroll();

  } catch (err) {
    container.innerHTML = "<p>Unable to load events. Check F12 Console.</p>";
    console.error("TuneHatch Error:", err);
  }
})();

function startAutoScroll() {
  setInterval(() => {
    window.scrollBy(0, 1);
    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
      window.scrollTo(0, 0); // Loop back to top
    }
  }, 50); // Adjust '50' for speed
}
</script>
</body>
</html>
