<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 5 Spot – Upcoming Shows</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin: 20px 0;
    font-size: 2.2rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .events {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    max-width: 90vw;
  }
  .event {
    text-align: center;
  }
  .event img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
  }
  .title {
    margin-top: 10px;
    font-size: 1.4rem;
  }
  .date {
    font-size: 1rem;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <h1>Upcoming Shows</h1>
  <div id="events" class="events"></div>
<script>
(async () => {
  try {
    const feedUrl = "https://tunehatch.com";
    
    // FIX: Added '?url=' so the proxy knows where to go
    const proxyUrl = "https://api.allorigins.win" + encodeURIComponent(feedUrl);
    
    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error("Network error");
    
    const data = await response.json();
    
    // FIX: Parse the 'contents' string into an actual list
    const shows = JSON.parse(data.contents); 

    const container = document.getElementById("events");
    const options = { month: "short", day: "numeric", weekday: "short" };
    
    container.innerHTML = ""; // Clear "Unable to load" message
    
    shows.slice(0, 4).forEach(show => {
      const date = new Date(show.startDate);
      const div = document.createElement("div");
      div.className = "event";
      div.innerHTML = `
        <a href="${show.ticketUrl}" target="_blank">
          <img src="${show.imageUrl}" alt="${show.title}" style="width:100%; border-radius:10px;">
        </a>
        <div class="title" style="margin-top:10px; font-size:1.4rem;">${show.title}</div>
        <div class="date" style="opacity:0.8;">${date.toLocaleDateString("en-US", options)}</div>
      `;
      container.appendChild(div);
    });
  } catch (err) {
    document.getElementById("events").innerHTML = "<p>Unable to load events.</p>";
    console.error("Error loading shows:", err);
  }
})();
</script>
</body>
</html>
