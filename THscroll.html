<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 5 Spot – Upcoming Shows</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        h1 { margin: 20px 0; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #fff; padding-bottom: 10px; }
        .events { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 90vw; padding-bottom: 200px; }
        .event { text-align: center; }
        .event img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.2); background: #222; }
        .title { margin-top: 15px; font-size: 1.6rem; font-weight: bold; }
        .date { font-size: 1.2rem; opacity: 0.8; margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1>Upcoming Shows</h1>
    <div id="events" class="events">Loading shows...</div>

<script>
(async function loadShows() {
    const container = document.getElementById("events");
    
    try {
        const targetUrl = "https://tunehatch.com";
        // Using standard string concatenation to avoid template literal errors
        const finalUrl = "https://api.allorigins.win" + encodeURIComponent(targetUrl);
        
        console.log("Fetching from:", finalUrl);

        const response = await fetch(finalUrl);
        if (!response.ok) throw new Error("Proxy connection failed");
        
        const data = await response.json();
        
        // AllOrigins returns a 'contents' string which we must parse into JSON
        const shows = JSON.parse(data.contents); 

        if (!shows || shows.length === 0) {
            container.innerHTML = "<h2>No upcoming shows found.</h2>";
            return;
        }

        container.innerHTML = ""; 
        const options = { month: "short", day: "numeric", weekday: "short" };
        
        shows.forEach(show => {
            const date = new Date(show.startDate);
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = 
                '<img src="' + (show.imageUrl || '') + '" alt="' + (show.title || 'Show') + '">' +
                '<div class="title">' + (show.title || 'Upcoming Event') + '</div>' +
                '<div class="date">' + date.toLocaleDateString("en-US", options) + '</div>';
            container.appendChild(div);
        });

        startAutoScroll();

    } catch (err) {
        container.innerHTML = "<p style='color:red; font-size: 1.5rem;'>Unable to load events. Retrying in 10 seconds...</p>";
        console.error("TuneHatch Load Error:", err);
        setTimeout(() => location.reload(), 10000);
    }
})();

function startAutoScroll() {
    // Scroll 1 pixel every 40 milliseconds
    setInterval(function() {
        window.scrollBy(0, 1);
        // Reset to top if we hit the bottom
        if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2) {
            window.scrollTo(0, 0);
        }
    }, 40); 
}
</script>
</body>
</html>
