<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The 5 Spot – Upcoming Shows</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        h1 { margin: 20px 0; font-size: 2.5rem; text-transform: uppercase; border-bottom: 2px solid #fff; padding-bottom: 10px; }
        .events { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 90vw; padding-bottom: 400px; }
        .event { text-align: center; margin-bottom: 20px; }
        .event img { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.2); background: #222; }
        .title { margin-top: 15px; font-size: 1.6rem; font-weight: bold; }
        .date { font-size: 1.2rem; opacity: 0.8; }
    </style>
</head>
<body>
    <h1>Upcoming Shows</h1>
    <div id="events" class="events">Loading shows...</div>

<script>
(async function loadShows() {
    const container = document.getElementById("events");
    try {
        const targetUrl = "https://tunehatch.com/api/v1/shows/feed/dc6b2a1a-b2c4-489b-bade-d1f3664ae171";
        const finalUrl = "https://api.allorigins.win" + encodeURIComponent(targetUrl);
        
        console.log("Fetching from:", finalUrl);

        const response = await fetch(finalUrl);
        if (!response.ok) throw new Error("Network error");
        
        const data = await response.json();
        const shows = JSON.parse(data.contents); 

        if (!shows || shows.length === 0) {
            container.innerHTML = "<h2>No shows currently scheduled.</h2>";
            return;
        }

        container.innerHTML = ""; 
        const options = { month: "short", day: "numeric", weekday: "short" };
        
        shows.forEach(function(show) {
            const date = new Date(show.startDate);
            const div = document.createElement("div");
            div.className = "event";
            div.innerHTML = 
                '<img src="' + (show.imageUrl || "") + '">' +
                '<div class="title">' + (show.title || "Show") + '</div>' +
                '<div class="date">' + date.toLocaleDateString("en-US", options) + '</div>';
            container.appendChild(div);
        });

        startAutoScroll();

    } catch (err) {
        container.innerHTML = "<p style='color:red;'>Connection Error. Retrying...</p>";
        console.error("Load Error:", err);
        setTimeout(function() { location.reload(); }, 5000);
    }
})();

function startAutoScroll() {
    setInterval(function() {
        window.scrollBy(0, 1);
        if ((window.innerHeight + window.pageYOffset) >= document.body.offsetHeight - 2) {
            window.scrollTo(0, 0);
        }
    }, 40); 
}
</script>
</body>
</html>
